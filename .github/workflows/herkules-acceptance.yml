name: HERKULES Acceptance

on:
  workflow_dispatch:
    inputs:
      first_page:
        description: First page to import
        required: true
        default: "1"
      last_page:
        description: Last page to import
        required: true
        default: "1"
      ocr_engine:
        description: OCR engine to use
        required: true
        default: tesseract

jobs:
  acceptance:
    name: HERKULES acceptance harness
    runs-on: ubuntu-latest

    env:
      EDT_HERKULES_FIRST_PAGE: ${{ inputs.first_page }}
      EDT_HERKULES_LAST_PAGE: ${{ inputs.last_page }}
      EDT_HERKULES_OCR_ENGINE: ${{ inputs.ocr_engine }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr

      - name: Install EDT
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run HERKULES acceptance harness
        run: |
          python -m pytest tests/acceptance/test_herkules_acceptance.py -q
