name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e . pytest
      - run: make test
      - run: cd examples/minimal-book && edt build
      - run: cd examples/minimal-book && test -f output/book.html
